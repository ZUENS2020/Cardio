; Cardio — Cardputer ADV 固件
; 板子：M5Stack Cardputer ADV（ESP32-S3FN8，8MB Flash，无 PSRAM，512KB SRAM）

[platformio]
; 沿用 CLAUDE.md 中的扁平目录结构（Cardio.ino 与 config/ debug/ … 同级）
src_dir = .

[env:cardputer-adv]
platform = espressif32
; ESP32-S3FN8 has NO PSRAM (M5Stack docs list ESP32-S3FN8 = flash-only, no R
; suffix; runtime confirms "PSRAM ID read error: 0x00000000").  Use the stock
; no-PSRAM board — do NOT configure OPI PSRAM for a chip that isn't there.
board = m5stack-stamps3
framework = arduino

; 默认 1.4MB App 分区放不下所有库，必须用 huge_app（3MB App）
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L

monitor_speed = 115200
upload_speed = 921600
; USB CDC 串口（ESP32-S3 原生 USB）
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Increase the main loop() task stack from the default 8 KB.
    ; The libhelix MP3 decoder and dr_flac both need stack > 8 KB during
    ; decode; without this flag the first gen->loop() call overflows and
    ; triggers a hard-fault black-screen reset.
    -D ARDUINO_LOOP_STACK_SIZE=32768
    -I config
    -I debug
    -I audio
    -I player
    -I net
    -I notify
    -I ui

; 按模块增量启用：用到哪个库就解开哪一行，避免一次性拉全部依赖。
lib_deps =
    m5stack/M5Cardputer
    earlephilhower/ESP8266Audio @ 1.9.7
    ; Day2  AudioEngine      → 已启用 ESP8266Audio 1.9.7（替代 ESP32-audioI2S）
    ; Day6  BLE 配网/调试     → h2zero/NimBLE-Arduino
    ; Week2 MqttClient       → knolleary/PubSubClient
    ; Week2 MqttClient WSS   → links2004/WebSockets
    ; Week2 Notify JSON 解析  → bblanchon/ArduinoJson

; ── bmorcelli Launcher 兼容构建 ────────────────────────────────────────────────
; 产出可被 Launcher（SD / WebUI / M5Burner 目录）安装的 firmware.bin。
;   pio run -e cardputer-adv-launcher
; 与主环境唯一区别是分区表：用 partitions_launcher.csv（app 上限 1.31MB），
; 编译期就卡住"装不进 Launcher"的体积问题。返回 Launcher 的逻辑在固件里按运行时
; 分区自动判定，两个环境通用、独立 USB 烧录也安全（无 Launcher 时为空操作）。
[env:cardputer-adv-launcher]
extends = env:cardputer-adv
board_build.partitions = partitions_launcher.csv
build_flags =
    ${env:cardputer-adv.build_flags}
    -D LAUNCHER_BUILD=1
