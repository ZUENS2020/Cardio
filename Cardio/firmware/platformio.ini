; Cardio — Cardputer ADV 固件
; 板子：M5Stack Cardputer ADV（ESP32-S3，8MB OPI PSRAM）

[platformio]
; 沿用 CLAUDE.md 中的扁平目录结构（Cardio.ino 与 config/ debug/ … 同级）
src_dir = .

[env:cardputer-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino

; 默认 1.4MB App 分区放不下所有库，必须用 huge_app（3MB App）
board_build.partitions = huge_app.csv
; 8MB OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.f_cpu = 240000000L

monitor_speed = 115200
; USB CDC 串口（ESP32-S3 原生 USB）
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM=1
    -I config
    -I debug
    -I audio
    -I player
    -I net
    -I notify
    -I ui

; 按模块增量启用：用到哪个库就解开哪一行，避免一次性拉全部依赖。
lib_deps =
    m5stack/M5Cardputer
    earlephilhower/ESP8266Audio @ 1.9.7
    ; Day2  AudioEngine      → 已启用 ESP8266Audio 1.9.7（替代 ESP32-audioI2S）
    ; Day6  BLE 配网/调试     → h2zero/NimBLE-Arduino
    ; Week2 MqttClient       → knolleary/PubSubClient
    ; Week2 MqttClient WSS   → links2004/WebSockets
    ; Week2 Notify JSON 解析  → bblanchon/ArduinoJson
