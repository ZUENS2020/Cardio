; Cardputer 临时「通断表」—— 测 PCM5102 板 SCK↔GND 是否已接地
; 烧录:  cd 本目录;  pio run -e cardputer-adv -t upload
; 用完恢复音乐固件:  cd ../../firmware;  pio run -e cardputer-adv -t upload
[env:cardputer-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
monitor_speed = 115200
lib_deps = m5stack/M5Cardputer
